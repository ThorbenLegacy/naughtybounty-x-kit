<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="ad.size" content="width=300,height=250" />
  <meta name="viewport" content="width=300, height=250" />
  <title>NaughtyBounty — Anonym mit deinen Bildern &amp; Videos (300×250)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --background: #1e1e2c;
      --foreground: #f4f4fc;
      --muted-foreground: #9e9ebc;
      --primary: #a78bfa;
      --primary-foreground: #f4f4fc;
      --border: #3c3c58;
      --radius-2xl: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 300px; height: 250px; overflow: hidden; }

    body {
      font-family: Figtree, ui-sans-serif, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      background: var(--background);
      color: var(--foreground);
    }

    .ad-canvas {
      width: 300px;
      height: 250px;
      overflow: hidden;
      position: relative;
    }

    .ad-canvas::before {
      content: "";
      position: absolute;
      inset: -30%;
      background: radial-gradient(circle at 35% 45%, rgba(167, 139, 250, 0.18), transparent 58%);
      pointer-events: none;
    }

    .banner {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      gap: 12px;
      width: 300px;
      height: 250px;
      padding: 14px 14px 14px 12px;
      text-decoration: none;
      color: inherit;
    }

    .brand-col {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
      flex-shrink: 0;
      width: 122px;
    }

    .logo {
      width: 118px;
      height: 118px;
      object-fit: contain;
      flex-shrink: 0;
      filter: drop-shadow(0 8px 24px rgba(167, 139, 250, 0.22));
    }

    .brand-name {
      margin-top: 2px;
      font-size: 14px;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      text-align: center;
      width: 100%;
    }

    .content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      gap: 10px;
      min-width: 0;
      flex: 1;
    }

    /* WORDING.md — Header: Pre + Accent-Pill + Post */
    .header {
      font-size: 20px;
      font-weight: 900;
      line-height: 0.95;
      letter-spacing: -0.025em;
      color: var(--foreground);
    }

    .accent-wrap {
      display: inline-flex;
      align-items: baseline;
    }

    .accent {
      border-radius: var(--radius-2xl);
      background: var(--primary);
      color: var(--primary-foreground);
      padding: 0 7px;
      box-shadow: 0 2px 10px rgba(167, 139, 250, 0.28);
    }

    /* WORDING.md — Badges (getrennt vom Header, Outline-Stil) */
    .badge {
      display: inline-flex;
      align-items: center;
      padding: 5px 10px;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(40, 40, 62, 0.85);
      font-size: 11px;
      font-weight: 600;
      line-height: 1;
      color: var(--foreground);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <div class="ad-canvas">
    <a class="banner" href="https://naughtybounty.com/for-creators" target="_blank" rel="noopener noreferrer">
      <div class="brand-col">
        <img
          class="logo"
          src="../../../assets/logo_darkmode.svg"
          alt="NaughtyBounty"
          width="118"
          height="118"
        />
        <span class="brand-name">NaughtyBounty</span>
      </div>
      <div class="content">
        <h1 class="header">
          <span class="accent-wrap"><span class="accent">Anonym</span></span> mit deinen Bildern &amp; Videos Geld verdienen
        </h1>
        <span class="badge">Diskret</span>
      </div>
    </a>
  </div>
</body>
</html>
