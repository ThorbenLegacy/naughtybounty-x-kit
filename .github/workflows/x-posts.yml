name: X Posts (3x daily)

on:
  schedule:
    - cron: "0 7 * * *"
    - cron: "0 13 * * *"
    - cron: "0 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: npm ci

      - run: pip install -r requirements.txt && playwright install chromium

      - name: Build creatives (PNG für Post)
        run: npm run build:all

      - name: Post to X
        env:
          X_OAUTH2_ACCESS_TOKEN: ${{ secrets.X_OAUTH2_ACCESS_TOKEN }}
          X_OAUTH2_REFRESH_TOKEN: ${{ secrets.X_OAUTH2_REFRESH_TOKEN }}
          X_CLIENT_ID: ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
        run: npm run x:post -- --week

      - name: Persist bot state
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore(x-kit): update post state"
          file_pattern: data/persist/state.json
